appId: com.rafaelperazzo.appdc
name: "06 - Manutenção Tab"
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 16000
- tapOn:
    text: "Manutenção"
- waitForAnimationToEnd:
    timeout: 20000
- assertVisible:
    text: "SAGE Manutenção"
# Badge ADMIN não deve aparecer em modo público
- assertNotVisible:
    text: "ADMIN"
- takeScreenshot: screenshots/06_manutencao_tab
- stopApp
