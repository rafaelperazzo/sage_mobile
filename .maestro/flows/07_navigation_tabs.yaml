appId: com.rafaelperazzo.appdc
name: "07 - Full Tab Navigation"
---
# Navega por todas as 6 abas em sequência sem crash
- launchApp
- waitForAnimationToEnd:
    timeout: 16000

# 1. Início (ponto de partida)
- assertVisible:
    text: "SAGE"

# 2. Map
- tapOn:
    text: "Map"
- waitForAnimationToEnd:
    timeout: 20000
- assertVisible:
    text: "SAGE Map"

# 3. Agenda
- tapOn:
    text: "Agenda"
- waitForAnimationToEnd:
    timeout: 20000
- assertVisible:
    text: "SAGE Agenda"

# 4. Report
- tapOn:
    text: "Report"
- waitForAnimationToEnd:
    timeout: 30000
- assertVisible:
    text: "SAGE Report"

# 5. Auditório
- tapOn:
    text: "Auditório"
- waitForAnimationToEnd:
    timeout: 20000
- assertVisible:
    text: "SAGE Auditório"

# 6. Manutenção
- tapOn:
    text: "Manutenção"
- waitForAnimationToEnd:
    timeout: 20000
- assertVisible:
    text: "SAGE Manutenção"

# 7. Volta ao Início
- tapOn:
    text: "Início"
- waitForAnimationToEnd:
    timeout: 16000
- assertVisible:
    text: "SAGE"

- takeScreenshot: screenshots/07_navigation_complete
- stopApp
