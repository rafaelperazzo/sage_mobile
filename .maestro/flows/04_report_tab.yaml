appId: com.rafaelperazzo.appdc
name: "04 - Report Tab"
---
- launchApp
- waitForAnimationToEnd:
    timeout: 16000
- tapOn:
    text: "Report"
# Report pode demorar para renderizar gráficos (Supabase + Skia)
- waitForAnimationToEnd:
    timeout: 30000
- assertVisible:
    text: "SAGE Report"
- takeScreenshot: screenshots/04_report_tab
- stopApp
