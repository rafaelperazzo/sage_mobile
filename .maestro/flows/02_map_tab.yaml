appId: com.rafaelperazzo.appdc
name: "02 - Map Tab"
---
- launchApp
- waitForAnimationToEnd:
    timeout: 16000
- tapOn:
    text: "Map"
- waitForAnimationToEnd:
    timeout: 20000
# Header da aba
- assertVisible:
    text: "SAGE Map"
# Badge ADMIN não deve aparecer em modo público
- assertNotVisible:
    text: "ADMIN"
- takeScreenshot: screenshots/02_map_tab
- stopApp
