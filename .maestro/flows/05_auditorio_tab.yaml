appId: com.rafaelperazzo.appdc
name: "05 - Auditório Tab"
---
- launchApp
- waitForAnimationToEnd:
    timeout: 16000
- tapOn:
    text: "Auditório"
- waitForAnimationToEnd:
    timeout: 20000
- assertVisible:
    text: "SAGE Auditório"
# Badge ADMIN não deve aparecer em modo público
- assertNotVisible:
    text: "ADMIN"
- takeScreenshot: 05_auditorio_tab
- stopApp
