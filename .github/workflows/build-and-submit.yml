name: Build & Submit Android

on:
  push:
    tags:
      - 'v*.*.0'

jobs:
  build-and-submit:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          node -e "
            const fs = require('fs');
            const app = require('./app.json');
            app.expo.version = process.env.VERSION;
            app.expo.runtimeVersion = process.env.VERSION;
            fs.writeFileSync('./app.json', JSON.stringify(app, null, 2) + '\n');
          "
          echo "Version set to $VERSION"
        env:
          VERSION: ${{ github.ref_name }}

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write Google service account key
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > brseclabapp-e9bccb91d544.json

      - name: EAS Build (Local)
        run: |
          export GRADLE_OPTS="-Dorg.gradle.jvmargs='-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError' -Dorg.gradle.daemon=false"
          eas build --platform android --profile production --local --non-interactive
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          ORG_GRADLE_PROJECT_android.lint.abortOnError: "false"
          ORG_GRADLE_PROJECT_android.lint.checkReleaseBuilds: "false"

      - name: Submit to Play Store
        run: |
          AAB=$(ls -t build-*.aab | head -1)
          eas submit --platform android --profile production --path "$AAB" --non-interactive

      - name: Cleanup service account key
        if: always()
        run: rm -f brseclabapp-e9bccb91d544.json
