name: Build & Submit Android

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-submit:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          node -e "
            const fs = require('fs');
            const app = require('./app.json');
            app.expo.version = process.env.VERSION;
            app.expo.runtimeVersion = process.env.VERSION;
            fs.writeFileSync('./app.json', JSON.stringify(app, null, 2) + '\n');
          "
          echo "Version set to $VERSION"
        env:
          VERSION: ${{ github.ref_name }}

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write Google service account key
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > brseclabapp-e9bccb91d544.json

      - name: Injetar Configurações (Lint + Edge-to-Edge + Memory)
        run: |
          npm install expo-build-properties
          sudo apt-get install -y jq
          jq '.expo.plugins += [["expo-build-properties", {
            "android": {
              "extraGradleArguments": ["-Pandroid.lint.abortOnError=false", "-Pandroid.lint.checkReleaseBuilds=false"],
              "gradleJvmArgs": "-Xmx4096m -XX:MaxMetaspaceSize=1024m",
              "compileSdkVersion": 36,
              "targetSdkVersion": 35,
              "enableEdgeToEdge": true
            }
          }]]' app.json > temp.json && mv temp.json app.json
          
          echo "Configurações de JVM e Lint aplicadas dinamicamente"
      
      - name: Build (local)
        run: eas build --platform android --profile production --local --non-interactive
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g"

      - name: Submit to Play Store
        run: |
          AAB=$(ls -t build-*.aab | head -1)
          eas submit --platform android --profile production --path "$AAB" --non-interactive

      - name: Cleanup service account key
        if: always()
        run: rm -f brseclabapp-e9bccb91d544.json
