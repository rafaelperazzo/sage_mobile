name: E2E Tests (Maestro)

on:
  workflow_dispatch:
  #push:
  #  branches: [master]
  #  paths-ignore:
  #    - "**.md"
  #    - ".github/workflows/eas-update.yml"
  #    - ".github/workflows/build-and-submit.yml"
  #schedule:
    # Segunda a sexta às 06:00 UTC (03:00 BRT)
  #  - cron: "0 6 * * 1-5"

jobs:
  # ── Job 1: Gera o APK de debug ─────────────────────────────────────────────
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm ci

      - name: Expo Prebuild (Android)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Generate React Native Bundle
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export:embed --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug -PbundleInDebug=true --no-daemon
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs='-Xmx4096m -XX:MaxMetaspaceSize=1024m'
            -Dorg.gradle.daemon=false

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sage-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ── Job 2: Executa os testes no emulador ───────────────────────────────────
  e2e-tests:
    name: Run E2E Tests
    needs: build-apk
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # Habilita KVM para aceleração do emulador Android no runner Ubuntu
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: sage-debug-apk
          path: ./apk

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "${HOME}/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Maestro flows on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        with:
          api-level: 31
          arch: x86_64
          profile: pixel_6
          ram-size: 4096M
          heap-size: 512M
          emulator-options: >-
            -no-snapshot-save
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -camera-back none
          disable-animations: true
          script: |
            # Desbloqueia a tela do emulador
            adb shell input keyevent 82

            # Instala o APK
            adb install -r apk/app-debug.apk
            sleep 5

            # Lança o app e aguarda para diagnóstico
            adb shell am start -n com.rafaelperazzo.appdc/.MainActivity
            sleep 10
            adb exec-out screencap -p > diagnostic_screen.png

            # Executa cada flow individualmente via script
            bash test.sh

      - name: Upload diagnostic screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-screen
          path: diagnostic_screen.png
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots
          path: screenshots/*.png
          if-no-files-found: ignore
          retention-days: 30
